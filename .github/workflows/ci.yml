name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-test-audit:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore .\Integracao.ControlID.PoC.sln --locked-mode

      - name: Restore device stub
        run: dotnet restore .\tools\ControlIdDeviceStub\ControlIdDeviceStub.csproj --locked-mode

      - name: Restore signing proxy
        run: dotnet restore .\tools\ControlIdCallbackSigningProxy\ControlIdCallbackSigningProxy.csproj --locked-mode

      - name: Build
        run: dotnet build .\Integracao.ControlID.PoC.sln --no-restore -v:minimal

      - name: Build device stub
        run: dotnet build .\tools\ControlIdDeviceStub\ControlIdDeviceStub.csproj --no-restore -v:minimal

      - name: Build signing proxy
        run: dotnet build .\tools\ControlIdCallbackSigningProxy\ControlIdCallbackSigningProxy.csproj --no-restore -v:minimal

      - name: Test
        run: dotnet test .\Integracao.ControlID.PoC.sln --no-build -v:minimal

      - name: Localhost smoke test
        shell: pwsh
        run: .\tools\smoke-localhost.ps1 -ReportPath .\artifacts\smoke\localhost-smoke-ci.md

      - name: Format check
        run: dotnet format .\Integracao.ControlID.PoC.sln --verify-no-changes --no-restore -v:minimal

      - name: Format signing proxy check
        run: dotnet format .\tools\ControlIdCallbackSigningProxy\ControlIdCallbackSigningProxy.csproj --verify-no-changes --no-restore -v:minimal

      - name: Secret scan
        shell: pwsh
        run: .\tools\scan-secrets.ps1

      - name: Observability artifact check
        shell: pwsh
        run: .\tools\observability-check.ps1 -OfflineValidateOnly

      - name: Operational readiness artifact check
        shell: pwsh
        run: .\tools\operational-readiness-check.ps1

      - name: FinOps capacity artifact check
        shell: pwsh
        run: .\tools\finops-capacity-check.ps1

      - name: Supply-chain audit
        shell: pwsh
        run: .\tools\audit-supply-chain.ps1

      - name: Vulnerability audit
        shell: pwsh
        run: |
          $targets = @(
            ".\Integracao.ControlID.PoC.sln",
            ".\tools\ControlIdDeviceStub\ControlIdDeviceStub.csproj",
            ".\tools\ControlIdCallbackSigningProxy\ControlIdCallbackSigningProxy.csproj"
          )

          foreach ($target in $targets) {
            $audit = dotnet list $target package --vulnerable --include-transitive 2>&1
            $audit | Write-Output
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }

            $auditText = $audit -join "`n"
            if ($auditText -match '(?m)^\s*>\s+\S+\s+\S+\s+\S+') {
              Write-Error "Vulnerable NuGet packages were found in $target."
              exit 1
            }
          }

  container-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker build
        run: docker build --pull -t integracao-controlid-poc:ci .
